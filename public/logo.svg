<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F0D2E;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" stroke="url(#logoGrad)" stroke-width="2"/>

  <!-- Outer ring accent -->
  <circle cx="100" cy="100" r="86" stroke="url(#glowGrad)" stroke-width="0.5" fill="none" stroke-dasharray="4 6"/>

  <!-- Neural network background dots -->
  <circle cx="55" cy="60" r="2" fill="#818CF8" opacity="0.5"/>
  <circle cx="75" cy="45" r="1.5" fill="#A78BFA" opacity="0.4"/>
  <circle cx="125" cy="45" r="1.5" fill="#A78BFA" opacity="0.4"/>
  <circle cx="145" cy="60" r="2" fill="#818CF8" opacity="0.5"/>
  <circle cx="155" cy="90" r="1.5" fill="#A78BFA" opacity="0.3"/>
  <circle cx="45" cy="90" r="1.5" fill="#A78BFA" opacity="0.3"/>
  <circle cx="65" cy="130" r="1.5" fill="#818CF8" opacity="0.4"/>
  <circle cx="135" cy="130" r="1.5" fill="#818CF8" opacity="0.4"/>

  <!-- Neural connection lines -->
  <line x1="55" y1="60" x2="75" y2="45" stroke="#4F46E5" stroke-width="0.5" opacity="0.4"/>
  <line x1="75" y1="45" x2="125" y2="45" stroke="#4F46E5" stroke-width="0.5" opacity="0.4"/>
  <line x1="125" y1="45" x2="145" y2="60" stroke="#4F46E5" stroke-width="0.5" opacity="0.4"/>
  <line x1="145" y1="60" x2="155" y2="90" stroke="#7C3AED" stroke-width="0.5" opacity="0.3"/>
  <line x1="55" y1="60" x2="45" y2="90" stroke="#7C3AED" stroke-width="0.5" opacity="0.3"/>

  <!-- PSI Symbol - main structure -->
  <!-- Left arc of ψ -->
  <path d="M 67 75 Q 55 95 67 120" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <!-- Right arc of ψ -->
  <path d="M 133 75 Q 145 95 133 120" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <!-- Center vertical line of ψ -->
  <line x1="100" y1="62" x2="100" y2="145" stroke="url(#logoGrad)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Bottom horizontal bar of ψ -->
  <line x1="82" y1="145" x2="118" y2="145" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Horizontal connector at top of ψ arcs -->
  <path d="M 67 75 Q 100 55 133 75" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Accent nodes at key points -->
  <circle cx="100" cy="62" r="4" fill="#A78BFA" filter="url(#glow)"/>
  <circle cx="67" cy="120" r="3" fill="#818CF8" opacity="0.8"/>
  <circle cx="133" cy="120" r="3" fill="#818CF8" opacity="0.8"/>

  <!-- Inner glow pulse ring -->
  <circle cx="100" cy="100" r="42" stroke="url(#glowGrad)" stroke-width="1" fill="none" opacity="0.3"/>
</svg>
